server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rag-datasource
  servlet:
    multipart:
      # 单文件最大 200MB
      max-file-size: 200MB
      # 单次请求最大 500MB（支持批量上传）
      max-request-size: 500MB

# =====================================================
# RAG 数据源接入模块自定义配置
# =====================================================
rag:
  datasource:
    parser:
      # 文档解析超时时间（秒）。超时后立即中断，防止恶意文件卡死线程
      parse-timeout-seconds: 60
      # 单文件最大允许字节数（200MB = 200 * 1024 * 1024）
      max-file-size-bytes: 209715200
      # 是否提取文档元数据（作者、创建时间等）
      extract-metadata: true
      # 最大提取文本长度（字符数）。超出则截断，防止超大文档撑爆内存
      max-content-length: 5000000
      # OCR 配置（Tika 可调用 Tesseract 对图片/扫描 PDF 做 OCR）
      ocr:
        enabled: false
        # Tesseract 语言包（需要安装 tesseract-ocr）
        language: chi_sim+eng
    # 文件类型白名单（MIME type）
    allowed-mime-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document   # docx
      - application/msword                                                          # doc
      - application/vnd.openxmlformats-officedocument.presentationml.presentation # pptx
      - application/vnd.ms-powerpoint                                              # ppt
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet         # xlsx
      - application/vnd.ms-excel                                                   # xls
      - application/vnd.ms-spreadsheetml # xls
      - text/csv # csv
      - text/x-web-markdown   # markdown
      - text/plain
      - text/html
      - text/markdown
      - application/json
      - text/xml
      - application/xml

# 模型配置
ai-model:
  providers:
    siliconflow:
      api-key: ${SILICONFLOW-API-KEY}
      base-url: https://api.siliconflow.cn/v1
      chat-streaming: true
      chat-model:
        - Qwen/Qwen3.5-122B-A10B
        - Qwen/Qwen3.5-35B-A3B
      embed-model:
        - Qwen/Qwen3-Embedding-4B
        - Qwen/Qwen3-Embedding-8B
      rerank-model:
        - Qwen/Qwen3-Reranker-4B
        - Qwen/Qwen3-Reranker-0.6B



# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.feng.rag: DEBUG
    org.apache.tika: WARN
    org.apache.pdfbox: WARN
    org.apache.poi: WARN